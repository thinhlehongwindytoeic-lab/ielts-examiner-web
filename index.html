<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 400px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; margin: 0;}
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h2 { color: #1a73e8; margin: 0; font-size: 20px; transition: all 0.4s ease-in-out; cursor: pointer;}
        .help-icon { background: #fbbc05; color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; font-size: 14px; }
        .help-icon:hover { background: #f2a600; }
        .help-box { display: none; background: #e8f0fe; border-left: 4px solid #1a73e8; padding: 10px; font-size: 13px; margin-bottom: 15px; border-radius: 4px; color: #333; line-height: 1.5; }
        .help-box a { color: #1a73e8; text-decoration: none; font-weight: bold; }
        .help-box a:hover { text-decoration: underline; }
        .row { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        .row input { flex: 1; margin-bottom: 0; }
        input, select, button { box-sizing: border-box; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit;}
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        .btn-del { background-color: #dc3545; width: 40px; font-size: 16px; padding: 6px 0;}
        .btn-del:hover { background-color: #c82333; }
        .full-width { width: 100%; margin-bottom: 10px; }
        
        #saveToast { color: #28a745; font-size: 12px; font-style: italic; text-align: right; margin-top: -5px; margin-bottom: 10px; opacity: 0; transition: opacity 0.5s ease-in-out; height: 15px; }
        #logBox { background-color: #1e1e1e; color: #00ff00; font-family: 'Calibri', sans-serif; font-size: 13px; height: 180px; overflow-y: auto; padding: 10px; border-radius: 4px; margin-top: 5px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); line-height: 1.4; display: block; }
        .log-err { color: #ff5555; }
        .log-warn { color: #ffcc00; }
        .action-btns { display: flex; gap: 5px; margin-top: 10px; }
        .action-btns button { flex: 1; padding: 6px; font-size: 12px; }
    </style>
</head>
<body>
    <!-- Màn hình khóa danh tính -->
    <div id="loginScreen" style="display: flex; flex-direction: column; gap: 10px; background: white; padding: 20px; min-height: 200px; justify-content: center;">
        <h2 style="text-align: center; margin-bottom: 20px; color: #1a73e8;">ĐĂNG NHẬP</h2>
        <input type="text" id="loginName" placeholder="Tên Giáo viên (VD: Công Minh)" style="padding: 10px;">
        <input type="email" id="loginEmail" placeholder="Email nhận kết quả (Bắt buộc)" style="padding: 10px;">
        <button id="btnLogin" style="padding: 12px; margin-top: 10px;">BẮT ĐẦU LÀM VIỆC</button>
        <p style="font-size: 11px; color: #666; text-align: center; margin-top: 10px;">Kết quả chấm sẽ được gửi thẳng vào Email này dưới dạng tệp đính kèm.</p>
    </div>

    <!-- Ứng dụng chính -->
    <div id="mainApp" style="display: none;">
    <div class="header-row">
        <h2 id="headerTitle" title="Bấm vào đây để đổi tên Giáo viên">🎯 IELTS EXAMINER PRO</h2>
        <div class="help-icon" id="btnHelp" title="Hướng dẫn lấy API Key">?</div>
    </div>

    <div class="help-box" id="helpBox">
        <strong>Hướng dẫn lấy API Key (Miễn phí):</strong><br>
        1. Gemini API: <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.<br>
        2. Deepgram API: <a href="https://console.deepgram.com/" target="_blank">Deepgram Console</a>.
    </div>
    
    <div class="row">
        <input type="password" id="geminiKey" placeholder="Gemini API Key (AIzaSy...)">
    </div>
    <div class="row">
        <input type="password" id="deepgramKey" placeholder="Deepgram API Key">
    </div>
    
    <div id="saveToast">✅ Đã tự động lưu API Key!</div>

    <!-- Đã ẩn ô nhập tên vì đã có màn hình Đăng nhập -->
    <div id="instructorContainer" style="display: none;">
        <input type="hidden" id="instructorName">
        <span id="vipCrown"></span>
    </div>

    <div id="adminModelContainer" style="display: none; margin-bottom: 10px; background: #fff9c4; padding: 6px; border-radius: 4px; border: 1px dashed #fbc02d;">

        <select id="adminModelSelect" class="full-width" style="margin-bottom: 6px; border-color: #fbc02d; font-weight: bold; padding: 6px;">
            <option value="gemini-3.5-flash">Gemini 3.5 Flash (Base)</option>
            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview (33% cost)</option>
            <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite (16% cost)</option>
        </select>
        <div style="display: flex; gap: 5px;">
            <div style="flex: 1; display: flex; align-items: center; justify-content: space-between; background: #ffe0b2; padding: 4px 6px; border-radius: 4px;">
                <label for="forcePaidCheck" style="font-size: 13px; font-weight: bold; color: #c62828; cursor: pointer;">💸 Force PAID API</label>
                <input type="checkbox" id="forcePaidCheck" style="cursor: pointer; width: 16px; height: 16px; margin: 0;">
            </div>
            <button id="btnResetLimit" style="background: #28a745; width: 100px; font-size: 12px; padding: 4px; border-radius: 4px; color: white; cursor: pointer; border: none; font-weight: bold;">🔄 Reset</button>
        </div>
    </div>

    <div class="row">
        <input type="text" id="studentName" list="studentList" placeholder="Student Name" autocomplete="off">
        <datalist id="studentList"></datalist>
        <button id="btnDelStudent" class="btn-del" title="Delete Student" style="display:none;">🗑️</button>
    </div>
    
    <input type="text" id="studentId" class="full-width" placeholder="Student ID">
    
    <input type="file" id="audioFile" class="full-width" accept="audio/*" style="margin-bottom: 4px;">
    
    <div id="costEstimateBox" style="display: none; font-size: 12px; color: #d84315; background: #ffe0b2; padding: 6px; border-radius: 4px; margin-bottom: 10px; text-align: center; font-weight: bold; border: 1px dashed #ffb74d;"></div>
    
    <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px;">
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="includeAudio" checked style="width: 16px; height: 16px; margin: 0 8px 0 0; cursor: pointer;">
            <label for="includeAudio" style="font-size: 13px; font-weight: bold; cursor: pointer;">Include Audio (Model Answers)</label>
        </div>
    </div>
    
    <div id="quotaDisplay" style="font-size: 13px; font-weight: bold; margin-bottom: 6px; text-align: center; padding: 6px; border-radius: 4px; display: none; transition: all 0.3s ease;"></div>
    <div id="budgetDisplay" style="font-size: 12px; font-weight: bold; margin-bottom: 12px; text-align: center; color: #d84315; display: none;"></div>

    <button id="btnGrade" class="full-width" style="padding: 12px;">START GRADING & EXPORT</button>
    
    <!-- KHUNG THÔNG BÁO TẤT CẢ ĐÃ XONG -->
    <div id="allDoneMsg" style="display: none; color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; padding: 10px; margin-top: 10px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 13px;">
        ✅ ALL DONE! BẠN HÃY KIỂM TRA EMAIL.
    </div>

    <div class="action-btns">

        <button id="btnToggleLog" style="background: #17a2b8;">Hide Log</button>
        <button id="btnClearLog" style="background: #6c757d;">Clear Log</button>
    </div>
    <div id="logBox"></div>
    </div> <!-- Đóng thẻ mainApp -->

    <script src="popup.js"></script>
</body>
</html>
